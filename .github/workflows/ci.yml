name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:server
      - run: npm run test:frontend
      - run: npm run build
